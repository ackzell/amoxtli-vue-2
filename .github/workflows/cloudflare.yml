name: Deploy to Cloudflare Pages
on:
  push:
    branches-ignore: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
          CF_PAGES_BRANCH: ${{ github.ref_name }}

      - name: Prune Worker bundle (WASM, source maps)
        run: |
          rm -rf dist/_worker.js/wasm
          find dist/_worker.js -name '*.map' -delete

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=amoxtli-vue --branch=${{ github.ref_name }}
