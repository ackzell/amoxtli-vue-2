<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<div id="app">
  <p>{{ message }}</p>
  <code>version: {{ version }}</code>
</div>

<script>
  const { createApp, ref, version } = Vue

  createApp({
    setup() {
      const message = ref('Hola Vue!')
      return {
        version,
        message,
      }
    },
  }).mount('#app')
</script>
