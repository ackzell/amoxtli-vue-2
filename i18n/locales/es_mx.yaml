invite:
  agreement:
    title: ¡Muchísimas gracias, {name}!
    body: Noscierto, no lo hice en un sólo prompt, pero ojalá que eso se note 😅😅
    note: >-
      Ya enserio, esta es una preview  privada de este proyecto. Lo
      compartí contigo porque de verdad valoro tu opinión y espero que me cuentes lo que realmente piensas. Así que muchas gracias por estar aquí. Aún
      está en progreso, pero creo que puedo compartir lo que ya tengo para empezar
      a orientarlo en la dirección correcta. Por favor usa el botón de "enviar comentarios" en la parte superior derecha, se ve así
    note2: >-
      El contenido está principalmente en inglés. No lo he traducido, pero dado que el feature existe, solo quería mostrarte que tengo en mis planes tener una versión en español también.
